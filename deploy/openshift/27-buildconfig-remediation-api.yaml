# Build on-cluster from your laptop (no Quay):
#   cd /path/to/basic-mcp && oc start-build remediation-api --from-dir=. --follow -n remediation-app
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: remediation-api
  namespace: remediation-app
  labels:
    app.kubernetes.io/name: remediation-api
    app.kubernetes.io/part-of: remediation-stack
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: deploy/openshift/Dockerfile.remediation-api
  output:
    to:
      kind: ImageStreamTag
      name: remediation-api:latest
  triggers:
    - type: ConfigChange
