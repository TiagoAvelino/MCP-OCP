apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-console
  namespace: remediation-app
  labels:
    app.kubernetes.io/name: agent-console
    app.kubernetes.io/part-of: remediation-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-console
        app.kubernetes.io/part-of: remediation-stack
    spec:
      containers:
        - name: nginx
          image: agent-console:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
