apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediation-api
  namespace: remediation-app
  labels:
    app.kubernetes.io/name: remediation-api
    app.kubernetes.io/part-of: remediation-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: remediation-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: remediation-api
        app.kubernetes.io/part-of: remediation-stack
    spec:
      serviceAccountName: remediation-api
      containers:
        - name: api
          # Replace with your image (internal registry, Quay, etc.)
          image: remediation-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8787
              name: http
          env:
            - name: REMEDIATION_PROJECT_ROOT
              value: "/app"
            # Optional LLM (remediate_use_llm / suggest env)
            # - name: GRANITE_API_BASE
            #   valueFrom: secretKeyRef: ...
            # - name: GRANITE_API_TOKEN
            #   valueFrom: secretKeyRef: ...
            # Dual-Route UI: comma-separated origins
            # - name: REMEDIATION_CORS_ORIGINS
            #   value: "https://agent-console-remediation-app.apps.example.com"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/remediation/health
              port: 8787
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/remediation/health
              port: 8787
            initialDelaySeconds: 15
            periodSeconds: 20
